name: DAST scanning using ZAProxy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

  jobs:
    zap_scan:
      needs: build-and-test
      runs-on: ubuntu-latest
      name: Scan the web application
      steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
      - name: ZAP Scan
        uses: zaproxy/action-full-scan@v0.14.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          docker_name: "ghcr.io/zaproxy/zaproxy:stable"
          target: "https://profound-connection-production-bed6.up.railway.app/person/personList"
